<!DOCTYPE html>
<html>

<head>

<title>MindBalance Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.loginBox{

background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;

}

input{

padding:10px;
width:200px;
margin:10px;

}

</style>

</head>

<body>

<div class="loginBox">

<h1>MindBalance</h1>

<p>Inicia sesión</p>

<input type="text" id="usuario" placeholder="Nombre">

<br>

<button onclick="login()">Entrar</button>

</div>

<script>

function login(){

let user = document.getElementById("usuario").value;

if(user == ""){

alert("Escribe tu nombre");

return;

}

localStorage.setItem("usuario",user);

window.location.href="dashboard.html";

}

</script>

</body>

</html>
